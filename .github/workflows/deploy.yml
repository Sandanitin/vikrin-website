name: Deploy Website to Hostinger

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Static Export
        run: npm run build

      - name: Combine PHP Backend
        run: cp -R vikrin-php-backend out/api

      - name: Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          protocol: ftp
          port: 21
          timeout: 300000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            api/sftp-upload.bat
            api/index.php

      - name: Notify on success
        if: success()
        run: echo "✅ Website and backend deployed successfully to Hostinger!"
