name: Deploy to Hostinger (PHP Backend)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'vikrin-php-backend/**'
  workflow_dispatch:

jobs:
  deploy-php-backend:
    name: Deploy PHP Backend to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy PHP API to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./vikrin-php-backend/
          server-dir: /public_html/
          protocol: ftp
          port: 21
          timeout: 300000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            sftp-upload.bat

      - name: Notify on success
        if: success()
        run: echo "✅ PHP backend deployed successfully to pink-echidna-330123.hostingersite.com/api/"

      - name: Notify on failure
        if: failure()
        run: echo "❌ PHP backend deployment failed. Check FTP credentials in repository secrets."
